name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-release:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo-packager binary
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-packager.exe
          key: cargo-packager-${{ runner.os }}

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked
        
      - name: Build exe
        run: cargo build --release

      - name: Build installer
        run: cargo packager --release

      - name: Compute SHA-256
        id: hash
        shell: bash
        run: |
          SETUP=$(ls target/release/*-setup.exe | head -1)
          sha256sum "$SETUP" > "${SETUP}.sha256"
          echo "setup=$SETUP" >> $GITHUB_OUTPUT
          echo "sha=$(cut -d' ' -f1 ${SETUP}.sha256)" >> $GITHUB_OUTPUT

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ## Erdos Auto Uploader ${{ github.ref_name }}

            Download and run the setup exe to install.

            **SHA-256:** `${{ steps.hash.outputs.sha }}`
          files: |
            ${{ steps.hash.outputs.setup }}
            ${{ steps.hash.outputs.setup }}.sha256
  