name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-release:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release
        run: cargo build --release

      - name: Compute SHA-256
        id: hash
        shell: bash
        run: |
          sha256sum target/release/erdos-auto-uploader.exe > erdos-auto-uploader.exe.sha256
          echo "sha=$(cut -d' ' -f1 erdos-auto-uploader.exe.sha256)" >> $GITHUB_OUTPUT

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ## Erdos Auto Uploader ${{ github.ref_name }}

            **SHA-256:** `${{ steps.hash.outputs.sha }}`

            Download `erdos-auto-uploader.exe` and optionally verify the hash matches before running.
          files: |
            target/release/erdos-auto-uploader.exe
            erdos-auto-uploader.exe.sha256
